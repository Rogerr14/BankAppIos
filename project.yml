name: BankApp
options:
  bundleIdPrefix: com.rruiz
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
configs:
  Debug-Dev: debug
  Release-Dev: release
  Debug-Prod: debug
  Release-Prod: release
targets:
  BankApp:
    type: application
    platform: iOS
    sources:
      - path: BankApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rruiz.bankapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: $(APP_DISPLAY_NAME)
        INFOPLIST_KEY_API_BASE_URL: $(API_BASE_URL)
        INFOPLIST_KEY_APP_ENVIRONMENT: $(APP_ENVIRONMENT)
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSFaceIDUsageDescription: Usa Face ID para proteger el acceso a tu banca.
      configs:
        Debug-Dev:
          PRODUCT_BUNDLE_IDENTIFIER: com.rruiz.bankapp.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DEV
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        Release-Dev:
          PRODUCT_BUNDLE_IDENTIFIER: com.rruiz.bankapp.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        Debug-Prod:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG PROD
        Release-Prod:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD
    configFiles:
      Debug-Dev: Config/Dev.xcconfig
      Release-Dev: Config/Dev.xcconfig
      Debug-Prod: Config/Prod.xcconfig
      Release-Prod: Config/Prod.xcconfig
    scheme:
      configVariants:
        - Dev
        - Prod
  BankAppTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: BankApp
